<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Destination B2 – Vocabulary</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0f1117;font-family:'Crimson Pro',Georgia,serif;color:#e8e0d0;overflow:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:4px}

/* Layout */
#app{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
#sidebar{width:220px;min-width:220px;background:#16181f;border-right:1px solid #2a2d3a;display:flex;flex-direction:column;transition:all .3s;overflow:hidden}
#sidebar.closed{width:0;min-width:0}
.sb-head{padding:16px 14px 10px;border-bottom:1px solid #2a2d3a}
.sb-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#c9a84c}
.sb-title{font-size:16px;font-weight:600;color:#f0e6c8;line-height:1.3;margin-top:2px}
.unit-list{flex:1;overflow-y:auto;padding:4px 0}
.unit-btn{width:100%;text-align:left;padding:8px 14px;background:transparent;border:none;border-left:3px solid transparent;color:#6060a0;cursor:pointer;font-size:12px;line-height:1.4;transition:all .15s;font-family:inherit}
.unit-btn:hover{color:#a0a0c0;background:#1a1c24}
.unit-btn.active{background:#c9a84c15;border-left-color:#c9a84c;color:#c9a84c}
.unit-num{font-size:9px;opacity:.5;display:block}
.sb-foot{padding:8px 14px;border-top:1px solid #2a2d3a;font-size:10px;color:#2a2a4a}

/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#header{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #2a2d3a;background:#13151c;flex-wrap:wrap}
#toggle-btn{background:none;border:1px solid #2a2d3a;color:#6060a0;cursor:pointer;padding:4px 9px;border-radius:6px;font-size:13px}
#unit-tag{flex:1;font-size:13px;font-weight:600;color:#f0e6c8}
.mode-bar{display:flex;gap:5px}
.mode-btn{padding:5px 12px;background:#1e2030;color:#6060a0;border:none;border-radius:20px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s}
.mode-btn.active{background:#c9a84c;color:#0f1117;font-weight:bold}

/* Panels */
#content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.panel{display:none;flex:1;overflow:hidden;flex-direction:column}
.panel.active{display:flex}

/* ===== WORD LIST ===== */
#list-area{flex:1;overflow-y:auto;padding:12px 16px}
.search-bar{padding:10px 16px;border-bottom:1px solid #2a2d3a;background:#13151c}
.search-bar input{width:100%;padding:8px 12px;background:#1e2030;border:1px solid #2a2d3a;border-radius:10px;color:#e8e0d0;font-size:13px;outline:none;font-family:inherit}
.search-bar input:focus{border-color:#c9a84c44}
.word-card{background:#16181f;border:1px solid #222438;border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.word-card:hover{border-color:#c9a84c44;background:#1a1c28}
.word-card.expanded{border-color:#c9a84c55;background:#1a1c28}
.wc-top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.wc-word{font-size:18px;font-weight:600;color:#f0e6c8}
.wc-phonetic{font-size:13px;color:#c9a84c;font-style:italic}
.wc-viet{font-size:12px;color:#8aba8a;margin-left:auto}
.wc-details{margin-top:10px;padding-top:10px;border-top:1px solid #2a2d3a;display:none;font-size:13px;line-height:1.7}
.word-card.expanded .wc-details{display:block}
.wc-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#4a4a7a;margin-bottom:2px}
.wc-meaning{color:#b0c0b0;margin-bottom:8px}
.wc-example{color:#6070a0;font-style:italic}
.no-results{text-align:center;padding:40px;color:#3a3a5a;font-size:14px}

/* ===== FLASHCARDS ===== */
#flash-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px;gap:16px}
.card-outer{width:100%;max-width:480px;height:260px;perspective:1000px;cursor:pointer}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:#1e2030;border:1px solid #2a2d3a;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.card-back{transform:rotateY(180deg);background:#1a2a1a;border-color:#3a5a3a}
.c-word{font-size:32px;font-weight:600;color:#f0e6c8;margin-bottom:6px}
.c-ph{font-size:16px;color:#c9a84c;font-style:italic}
.c-hint{font-size:11px;color:#3a3a5a;margin-top:auto}
.c-meaning{font-size:13px;color:#b0c0b0;line-height:1.6;margin-bottom:10px}
.c-viet{font-size:16px;color:#8aba8a;font-weight:600;margin-bottom:8px}
.c-ex{font-size:12px;color:#6070a0;font-style:italic;line-height:1.5}
.card-nav{display:flex;align-items:center;gap:12px}
.nav-btn{background:#1e2030;border:1px solid #2a2d3a;color:#c0c0d0;padding:8px 16px;border-radius:10px;cursor:pointer;font-size:13px;font-family:inherit}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.card-counter{font-size:12px;color:#4a4a6a;min-width:50px;text-align:center}
.gen-btn{padding:12px 28px;background:#c9a84c;border:none;border-radius:12px;color:#0f1117;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit}
.unit-lbl{font-size:11px;color:#4a4a6a;letter-spacing:2px}

/* ===== QUIZ ===== */
#quiz-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px 16px;gap:16px;overflow-y:auto}
.score-bar{font-size:12px;color:#5a5a7a;display:flex;gap:16px}
.s-good{color:#8aba8a;font-weight:bold}
.s-num{color:#c9a84c;font-weight:bold}
.quiz-card{width:100%;max-width:520px;background:#1e2030;border:1px solid #2a2d3a;border-radius:16px;padding:20px}
.quiz-q{font-size:15px;line-height:1.6;color:#f0e6c8;margin-bottom:16px}
.opt-btn{width:100%;padding:10px 14px;margin:4px 0;background:#16181f;border:1px solid #2a2d3a;border-radius:10px;color:#b0b0c0;cursor:pointer;font-size:13px;text-align:left;transition:all .2s;font-family:inherit}
.opt-btn:hover:not(:disabled){background:#1e2030}
.opt-btn.correct{background:#1a3a1a!important;border-color:#4a8a4a!important;color:#8aba8a!important}
.opt-btn.wrong{background:#3a1a1a!important;border-color:#8a4a4a!important;color:#c08080!important}
.opt-btn:disabled{cursor:default}
.opt-letter{color:#c9a84c;margin-right:8px}
.explanation{background:#16181f;border:1px solid #2a3a2a;border-radius:10px;padding:12px 14px;font-size:12px;color:#90a090;line-height:1.6;margin-top:10px}
.next-btn{padding:10px 24px;background:#c9a84c;border:none;border-radius:10px;color:#0f1117;font-size:13px;font-weight:bold;cursor:pointer;font-family:inherit;margin-top:8px}
.empty-state{margin:auto;text-align:center;color:#3a3a5a;padding:20px}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-title{font-size:16px;color:#5a5a7a;margin-bottom:16px}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="sb-head">
      <div class="sb-label">Destination</div>
      <div class="sb-title">B2 Vocabulary<br>Study App</div>
    </div>
    <div class="unit-list" id="unit-list"></div>
    <div class="sb-foot">14 units · 840 words · No AI needed</div>
  </div>

  <div id="main">
    <div id="header">
      <button id="toggle-btn" onclick="toggleSidebar()">◀</button>
      <div id="unit-tag">Unit 2 · Travel & Transport</div>
      <div class="mode-bar">
        <button class="mode-btn active" onclick="setMode('list')">📋 Words</button>
        <button class="mode-btn" onclick="setMode('flash')">🃏 Flashcards</button>
        <button class="mode-btn" onclick="setMode('quiz')">🎯 Quiz</button>
      </div>
    </div>

    <div id="content">

      <!-- WORD LIST -->
      <div id="panel-list" class="panel active">
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="Search words..." oninput="filterWords()"/>
        </div>
        <div id="list-area"></div>
      </div>

      <!-- FLASHCARDS -->
      <div id="panel-flash" class="panel">
        <div id="flash-area">
          <div class="empty-state" id="flash-empty">
            <div class="empty-icon">🃏</div>
            <div class="empty-title">Start flashcard session</div>
            <button class="gen-btn" onclick="startFlash()">Start Flashcards</button>
          </div>
          <div id="flash-session" style="display:none;width:100%;max-width:480px;display:none;flex-direction:column;align-items:center;gap:16px">
            <div class="unit-lbl" id="flash-lbl"></div>
            <div class="card-outer" onclick="flipCard()">
              <div class="card-inner" id="card-inner">
                <div class="card-face">
                  <div class="c-word" id="c-word"></div>
                  <div class="c-ph" id="c-ph"></div>
                  <div class="c-hint">Tap to reveal meaning</div>
                </div>
                <div class="card-face card-back">
                  <div class="c-meaning" id="c-meaning"></div>
                  <div class="c-viet" id="c-viet"></div>
                  <div class="c-ex" id="c-ex"></div>
                </div>
              </div>
            </div>
            <div class="card-nav">
              <button class="nav-btn" id="prev-btn" onclick="prevCard()">← Prev</button>
              <div class="card-counter" id="card-counter">1 / ?</div>
              <button class="nav-btn" id="next-btn" onclick="nextCard()">Next →</button>
            </div>
            <button class="nav-btn" onclick="startFlash()" style="font-size:11px;color:#4a4a6a">↻ Shuffle New Set</button>
          </div>
        </div>
      </div>

      <!-- QUIZ -->
      <div id="panel-quiz" class="panel">
        <div id="quiz-area">
          <div class="score-bar">
            <span>Score: <span class="s-good" id="q-cor">0</span> / <span id="q-tot">0</span></span>
            <span id="q-acc"></span>
          </div>
          <div class="empty-state" id="quiz-empty">
            <div class="empty-icon">🎯</div>
            <div class="empty-title">Test your vocabulary knowledge</div>
            <button class="gen-btn" onclick="nextQuiz()">Start Quiz</button>
          </div>
          <div class="quiz-card" id="quiz-card" style="display:none">
            <div class="quiz-q" id="quiz-q"></div>
            <div id="quiz-opts"></div>
            <div class="explanation" id="quiz-exp" style="display:none"></div>
            <button class="next-btn" id="quiz-next" style="display:none" onclick="nextQuiz()">Next Question →</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

ban onovertime."},{"num":23,"word":"Promotion","phonetic":"/prəˈməʊʃn/","meaning":"a move to a more important job or rankin a company or an organization","vietnamese":"(n)thăngchức","example":"The new job is a promotion for him."},{"num":24,"word":"Pension","phonetic":"/ˈpenʃn/","meaning":"an amount of money paid regularly by a governmentorcompany to somebody who has retiredfromwork","vietnamese":"(n)lươnghưu","example":"Theparty promisedto increasethebasic statepensionby £15aweek."},{"num":25,"word":"Company","phonetic":"/ˈkʌmpəni/","meaning":"a business organization that makes money by producing or selling goodsorservices","vietnamese":"(n)côngty","example":"It is the world's largest software company."},{"num":26,"word":"Firm","phonetic":"/fɜːm/","meaning":"abusinessorcompany","vietnamese":"côngty,doanhnghiệp","example":"They hired an engineering firm to produce a model of their device."},{"num":27,"word":"Business","phonetic":"/ˈbɪznəs/","meaning":"the activity of making, buying, selling or supplying goods or servicesformoney","vietnamese":"","example":"It's been a pleasure to do businesswithyou."},{"num":28,"word":"Union","phonetic":"/ˈjuːniən/","meaning":"an organization of workers, usually in a particular industry, that exists to protect their interests, improve conditionsofwork,etc.","vietnamese":"liênđoàn","example":"Teachers' unions in England are demanding the same improvements as in Scotland."},{"num":29,"word":"Charity","phonetic":"/ˈtʃærəti/","meaning":"an organization for helpingpeopleinneed","vietnamese":"từthiện","example":"Many charities sent money to help the victims of thefamine."},{"num":1,"word":"Backout","phonetic":"","meaning":"decide not to dosthyou agreedtodo","vietnamese":"không giữ đúng hẹn, nuốt lời","example":"He lost confidence and backed out of the deal at the last minute."},{"num":2,"word":"Bringout","phonetic":"","meaning":"produceandstarttosell anewproduct","vietnamese":"tungrasảnphẩm","example":"The band have just brought out their secondalbum."},{"num":3,"word":"Close","phonetic":"","meaning":"stop operating (for companies)","vietnamese":"đóng cửa, ngừng kinh doanh","example":"All the steelworks around here were closed down in the 1980s."},{"num":4,"word":"See","phonetic":"","meaning":"continue(orhelpto continue)totheendof sthunpleasantof difficult","vietnamese":"tiếp tục đến cuối cùng điều gì không dễ chịu/ khókhăn","example":"She's determinedto seethejobthrough."},{"num":5,"word":"Seeto","phonetic":"","meaning":"Will you see to the arrangements for thenextmeeting?","vietnamese":"giảiquyết,đốiphó","example":"giảiquyết,đốiphó"},{"num":6,"word":"Setto","phonetic":"","meaning":"start doing sth in a determined or enthusiasticway","vietnamese":"bắt đầu làm gì 1 cách quyếttâm,nhiệttình","example":"Buehrle is set to make his ninth straight opening-day start,a franchiserecord."},{"num":7,"word":"Setout","phonetic":"","meaning":"start working on sth in ordertoachieveanaim","vietnamese":"bắt đầu làm gì để đạt mục tiêu","example":"She set outtobreak theworldrecord."},{"num":8,"word":"Setup","phonetic":"","meaning":"start (a business, organisation,etc)","vietnamese":"thànhlập(côngty...)","example":"She took out abank loan and set up on herown."},{"num":9,"word":"Slowdown","phonetic":"","meaning":"decreasespeed","vietnamese":"giảmtốcđộ","example":"Slow down! You’re drivingtoofast."},{"num":10,"word":"Speedup","phonetic":"","meaning":"increasespeed","vietnamese":"tăngtốc","example":"You see drivers speeding up when they should be slowingdown."},{"num":11,"word":"Standin","phonetic":"","meaning":"do sb’s job for them while they are not available","vietnamese":"làmthayviệcchoai","example":"They can't replace Office in every office but can stand in for it in many homes"},{"num":12,"word":"Takeon","phonetic":"","meaning":"start to employ; accept (workorresponsibility)","vietnamese":"thuê,mướn","example":"She wastakenonas atrainee."},{"num":13,"word":"Takeover","phonetic":"","meaning":"take control of (a business,etc)","vietnamese":"đảm nhận , đảm nhiệm côngty,doanhnghiệp","example":"CBS Records was takenoverby Sony."},{"num":14,"word":"Turn","phonetic":"","meaning":"not accept (an offer, request,etc)","vietnamese":"từchối","example":"Why did she turn down your invitation?"},{"num":1,"word":"absentfromsth","phonetic":"","meaning":"Buffardi, who has been largely absent from the public eye, was sportingabeard.","vietnamese":"vắngmặt","example":"vắngmặt"},{"num":2,"word":"applyforsth","phonetic":"","meaning":"California companies could apply for grants and loans to retool their factories.","vietnamese":"xincáigì","example":"xincáigì"},{"num":3,"word":"applyinwriting","phonetic":"","meaning":"In Londonforexample,prospective visitors to the British museum had toapplyinwritingforadmission.","vietnamese":"vậndụngvàoviệcviếtlách","example":"vậndụngvàoviệcviếtlách"},{"num":4,"word":"attachsthtosth","phonetic":"","meaning":"Another idea is to attach knives to the front of atruckanddriveintoa crowd.","vietnamese":"đínhkèm,liênquanđến","example":"đínhkèm,liênquanđến"},{"num":5,"word":"attachedtosth","phonetic":"","meaning":"Russell clearly was attached to the excessive natures of this intertwinedgroup.","vietnamese":"kếtnối,thích","example":"kếtnối,thích"},{"num":6,"word":"begin doing/ to","phonetic":"","meaning":"At 13, your child can begin to do her own laundry and help prepare familymeals.","vietnamese":"bắtđầulàmgì","example":"bắtđầulàmgì"},{"num":7,"word":"beginbydoing","phonetic":"","meaning":"Canale said she hopes to begin by training 450 counselors inthenext twoyears.","vietnamese":"bắtđầubằngcáchlàmgì","example":"bắtđầubằngcáchlàmgì"},{"num":8,"word":"dependonsth/sb","phonetic":"","meaning":"You can't depend on a government regulation or a grant or a subsidy tohelpyou.","vietnamese":"phụthuộcvào","example":"phụthuộcvào"},{"num":9,"word":"experienced","phonetic":"","meaning":"Zoo officials said he is well-trained and highly experiencedinhandling tigers.","vietnamese":"có kinh nghiệm trong lĩnh vực nàođó","example":"có kinh nghiệm trong lĩnh vực nàođó"},{"num":10,"word":"good for sb (to","phonetic":"","meaning":"I thought it would be good for me to say it, but everything is worst withmenow.","vietnamese":"tốtchoailàmgì","example":"tốtchoailàmgì"},{"num":11,"word":"goodat","phonetic":"","meaning":"He's good at the specialty, and a team might just grab him in the seventhround.","vietnamese":"giỏivềcáigì","example":"giỏivềcáigì"},{"num":12,"word":"goodtosb","phonetic":"","meaning":"And hehasagoodnature,although nature has not been particularly goodtohim.","vietnamese":"tửtế,sẵnsànggiúpđỡai","example":"tửtế,sẵnsànggiúpđỡai"},{"num":13,"word":"qualifyas/insth","phonetic":"","meaning":"Slot machines are operated by the Delaware Lottery and thus qualify aslotteries.","vietnamese":"đủ trình độ chuyên môn như là/trongcáigì","example":"đủ trình độ chuyên môn như là/trongcáigì"},{"num":14,"word":"responsible for","phonetic":"","meaning":"We're each responsible for taking charge and making things happen forourselves.","vietnamese":"chịutráchnhiệm","example":"chịutráchnhiệm"},{"num":15,"word":"specialise in","phonetic":"","meaning":"Suma specialise in vegetarian, Fairtrade, organic, ethical and naturalproducts","vietnamese":"chuyênmônvềcáigì","example":"chuyênmônvềcáigì"},{"num":16,"word":"traintodo","phonetic":"","meaning":"Most of us can tell when anathlete puts in an honest day's work and howhardhemusttraintodoso.","vietnamese":"huấnluyệnđểlàmgì","example":"huấnluyệnđểlàmgì"},{"num":17,"word":"work as/at/in","phonetic":"","meaning":"We are looking for interesting people of all ages who live and workinthetown.","vietnamese":"làmviệcnhưlà/tạiđâu/ởđâu","example":"làmviệcnhưlà/tạiđâu/ởđâu"}]}];

let unitIdx = 0;
let mode = 'list';
let sidebarOpen = true;
let expandedCards = new Set();
let flashCards = [];
let flashIdx = 0;
let flashFlipped = false;
let quizAnswer = null;
let quizCurrent = null;
let quizScore = {c:0, t:0};

// Init
document.addEventListener('DOMContentLoaded', () => {
  buildSidebar();
  loadUnit(0);
  document.getElementById('search-input').addEventListener('keydown', e => {
    if(e.key === 'Escape') { e.target.value = ''; filterWords(); }
  });
});

function buildSidebar() {
  const list = document.getElementById('unit-list');
  list.innerHTML = '';
  VOCAB.forEach((u, i) => {
    const btn = document.createElement('button');
    btn.className = 'unit-btn' + (i === unitIdx ? ' active' : '');
    const unitNum = u.name.match(/UNIT\s+(\d+)/)?.[1] || '';
    const unitName = u.name.replace(/UNIT\s+\d+\s*:?\s*/i, '').trim();
    btn.innerHTML = `<span class="unit-num">UNIT ${unitNum}</span>${unitName}`;
    btn.onclick = () => loadUnit(i);
    list.appendChild(btn);
  });
}

function loadUnit(i) {
  unitIdx = i;
  const u = VOCAB[i];
  const unitNum = u.name.match(/UNIT\s+(\d+)/)?.[1] || '';
  const unitName = u.name.replace(/UNIT\s+\d+\s*:?\s*/i, '').trim();
  document.getElementById('unit-tag').textContent = `Unit ${unitNum} · ${unitName}`;
  buildSidebar();
  expandedCards.clear();
  document.getElementById('search-input').value = '';
  renderList();
  // Reset flash/quiz
  flashCards = []; flashIdx = 0; flashFlipped = false;
  document.getElementById('flash-empty').style.display = 'block';
  document.getElementById('flash-session').style.display = 'none';
  quizAnswer = null; quizCurrent = null;
  document.getElementById('quiz-empty').style.display = 'block';
  document.getElementById('quiz-card').style.display = 'none';
  quizScore = {c:0, t:0}; updateScore();
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('closed', !sidebarOpen);
  document.getElementById('toggle-btn').textContent = sidebarOpen ? '◀' : '▶';
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b,i) => b.classList.toggle('active', ['list','flash','quiz'][i] === m));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${m}`).classList.add('active');
}

// ===== WORD LIST =====
function renderList(filter='') {
  const area = document.getElementById('list-area');
  const words = VOCAB[unitIdx].words;
  const f = filter.toLowerCase().trim();
  const filtered = f ? words.filter(w =>
    w.word.toLowerCase().includes(f) ||
    w.meaning.toLowerCase().includes(f) ||
    w.vietnamese.toLowerCase().includes(f)
  ) : words;

  if (filtered.length === 0) {
    area.innerHTML = '<div class="no-results">No words found</div>';
    return;
  }

  area.innerHTML = filtered.map((w, i) => {
    const id = `wc-${i}`;
    const exp = expandedCards.has(id);
    return `<div class="word-card${exp?' expanded':''}" onclick="toggleCard('${id}',this)" id="${id}">
      <div class="wc-top">
        <span class="wc-word">${esc(w.word)}</span>
        ${w.phonetic ? `<span class="wc-phonetic">${esc(w.phonetic)}</span>` : ''}
        ${w.vietnamese ? `<span class="wc-viet">🇻🇳 ${esc(w.vietnamese)}</span>` : ''}
      </div>
      <div class="wc-details">
        ${w.meaning ? `<div class="wc-label">Meaning</div><div class="wc-meaning">${esc(w.meaning)}</div>` : ''}
        ${w.example ? `<div class="wc-label">Example</div><div class="wc-example">"${esc(w.example)}"</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id, el) {
  if (expandedCards.has(id)) {
    expandedCards.delete(id);
    el.classList.remove('expanded');
  } else {
    expandedCards.add(id);
    el.classList.add('expanded');
  }
}

function filterWords() {
  renderList(document.getElementById('search-input').value);
}

// ===== FLASHCARDS =====
function startFlash() {
  const words = VOCAB[unitIdx].words.filter(w => w.meaning || w.vietnamese);
  // Shuffle and take up to 15
  flashCards = shuffle([...words]).slice(0, 15);
  flashIdx = 0; flashFlipped = false;
  document.getElementById('flash-empty').style.display = 'none';
  const fs = document.getElementById('flash-session');
  fs.style.display = 'flex';
  const u = VOCAB[unitIdx];
  const unitNum = u.name.match(/UNIT\s+(\d+)/)?.[1] || '';
  document.getElementById('flash-lbl').textContent = `UNIT ${unitNum} · ${u.name.replace(/UNIT\s+\d+\s*:?\s*/i,'').trim().toUpperCase()}`;
  showCard();
}

function showCard() {
  const w = flashCards[flashIdx];
  document.getElementById('c-word').textContent = w.word;
  document.getElementById('c-ph').textContent = w.phonetic || '';
  document.getElementById('c-meaning').textContent = w.meaning || '';
  document.getElementById('c-viet').textContent = w.vietnamese ? '🇻🇳 ' + w.vietnamese : '';
  document.getElementById('c-ex').textContent = w.example ? `"${w.example}"` : '';
  document.getElementById('card-counter').textContent = `${flashIdx+1} / ${flashCards.length}`;
  document.getElementById('prev-btn').disabled = flashIdx === 0;
  document.getElementById('next-btn').disabled = flashIdx === flashCards.length - 1;
  flashFlipped = false;
  document.getElementById('card-inner').classList.remove('flipped');
}

function flipCard() {
  flashFlipped = !flashFlipped;
  document.getElementById('card-inner').classList.toggle('flipped', flashFlipped);
}
function prevCard() { if(flashIdx > 0) { flashIdx--; showCard(); } }
function nextCard() { if(flashIdx < flashCards.length-1) { flashIdx++; showCard(); } }

// ===== QUIZ =====
function nextQuiz() {
  document.getElementById('quiz-empty').style.display = 'none';
  document.getElementById('quiz-card').style.display = 'block';
  document.getElementById('quiz-exp').style.display = 'none';
  document.getElementById('quiz-next').style.display = 'none';
  quizAnswer = null;

  const words = VOCAB[unitIdx].words.filter(w => w.word && w.meaning && w.meaning.length > 10);
  if (words.length < 4) { alert('Not enough words in this unit for a quiz. Try another unit!'); return; }

  // Pick a random word as the answer
  const correct = words[Math.floor(Math.random() * words.length)];
  // Pick 3 wrong distractors
  const others = shuffle(words.filter(w => w.word !== correct.word)).slice(0, 3);
  const options = shuffle([correct, ...others]);
  const correctIdx = options.indexOf(correct);

  // Random question type
  const qtype = Math.random() < 0.5 ? 'meaning' : 'word';
  let question, optTexts;
  if (qtype === 'meaning') {
    question = `What is the meaning of "${correct.word}"${correct.phonetic ? ' ' + correct.phonetic : ''}?`;
    optTexts = options.map(w => w.meaning.substring(0, 80));
  } else {
    question = `Which word means: "${correct.meaning.substring(0, 100)}"?`;
    optTexts = options.map(w => w.word);
  }

  quizCurrent = { correct: correctIdx, explanation: `"${correct.word}" ${correct.phonetic||''} = ${correct.vietnamese||correct.meaning.substring(0,60)}` };

  document.getElementById('quiz-q').textContent = question;
  const optsEl = document.getElementById('quiz-opts');
  optsEl.innerHTML = ['A','B','C','D'].map((l,i) =>
    `<button class="opt-btn" onclick="answerQuiz(${i})"><span class="opt-letter">${l}.</span>${esc(optTexts[i])}</button>`
  ).join('');
}

function answerQuiz(idx) {
  if (quizAnswer !== null) return;
  quizAnswer = idx;
  quizScore.t++;
  if (idx === quizCurrent.correct) quizScore.c++;
  updateScore();
  document.querySelectorAll('.opt-btn').forEach((b,i) => {
    b.disabled = true;
    if (i === quizCurrent.correct) b.classList.add('correct');
    else if (i === idx) b.classList.add('wrong');
  });
  const exp = document.getElementById('quiz-exp');
  exp.textContent = (idx === quizCurrent.correct ? '✅ Correct! ' : '❌ Wrong. ') + quizCurrent.explanation;
  exp.style.display = 'block';
  document.getElementById('quiz-next').style.display = 'inline-block';
}

function updateScore() {
  document.getElementById('q-cor').textContent = quizScore.c;
  document.getElementById('q-tot').textContent = quizScore.t;
  const acc = document.getElementById('q-acc');
  if (quizScore.t > 0) {
    const p = Math.round(quizScore.c/quizScore.t*100);
    acc.innerHTML = `Accuracy: <span class="${p>60?'s-good':'s-num'}">${p}%</span>`;
  }
}

// ===== UTILS =====
function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
